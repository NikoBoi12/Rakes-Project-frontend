<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="style.css">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Syllabus Files</title>
</head>
<body>
    <img id="corner-top-left" src="ui-elements/dancing-teto.gif" alt="" class="corner-gif" />
    <img id="corner-top-right" src="ui-elements/teto-mesmerizer.gif" alt="" class="corner-gif" />
    <img id="corner-bottom-left" src="ui-elements/microwave-teto.gif" alt="" class="corner-gif" />
    <img id="corner-bottom-right" src="ui-elements/teto-tetoris.gif" alt="" class="corner-gif" />

    <header>
        <h1>Upload Syllabus Files</h1>
        <h2>Select your syllabus files to add events to your Google Calendar.</h2>
    </header>
    <main>
        <section>
            <form id="upload-form">
                <label for="syllabus-files" style="font-weight: 600; color: var(--primary-btn); margin-bottom: 0.5em; font-size: 1.08em;">
                    Select syllabus files
                </label>
                <input type="file" id="syllabus-files" name="syllabus-files" multiple accept=".pdf,.doc,.docx,.txt" />
                
                <fieldset style="margin-top: 1em; border: 1px solid var(--primary-btn); padding: 1em; border-radius: 4px;">
                    <legend style="font-weight: 600; color: var(--primary-btn);">Filter Events</legend>
                    <div style="display: flex; flex-direction: column; gap: 0.5em;">
                        <label style="display: flex; align-items: center; gap: 0.5em;">
                            <input type="checkbox" id="filter-office-hours" name="filter-office-hours" value="no_office_hours">
                            <span>Exclude Office Hours</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5em;">
                            <input type="checkbox" id="filter-class-times" name="filter-class-times" value="no_class_times">
                            <span>Exclude Class Times</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5em;">
                            <input type="checkbox" id="filter-exams" name="filter-exams" value="no_exams">
                            <span>Exclude Exams</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5em;">
                            <input type="checkbox" id="filter-assignments" name="filter-assignments" value="no_assignments">
                            <span>Exclude Assignments</span>
                        </label>
                    </div>
                </fieldset>
                
                <button type="submit">Upload</button>
            </form>
            <div id="upload-status"></div>
        </section>
    </main>
    <footer>
        <p>
            Created by Tyler Roelfs, Evan Wachendorf, & Jesse Mills
        </p>
    </footer>
    <audio autoplay loop style="display:none;">
        <source src="ui-elements/tetoris.mp3" type="audio/mp3">
    </audio>
    <script src="upload.js"></script>
</body>
</html>
