<!DOCTYPE html>
<html lang="en">
<link rel="stylesheet" href="style.css">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Syllabus Files</title>
</head>
<body>
    <header>
        <h1>Upload Syllabus Files</h1>
        <h2>Select your syllabus files to add events to your Google Calendar.</h2>
    </header>
    <main>
        <section>
            <form id="upload-form">
                <label for="syllabus-files" style="font-weight: 600; color: var(--primary-btn); margin-bottom: 0.5em; font-size: 1.08em;">
                    Select syllabus files
                </label>
                <input type="file" id="syllabus-files" name="syllabus-files" multiple accept=".pdf,.doc,.docx,.txt" />
                <button type="submit">Upload</button>
            </form>
            <div id="upload-status"></div>
        </section>
    </main>
    <footer>
        <p>
            Created by Tyler Roelfs, Evan Wachendorf, & Jesse Mills
        </p>
    </footer>
    <script src="upload.js"></script>
</body>
</html>
